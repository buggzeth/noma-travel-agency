<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Search</title>
    <style>
        /* Base styles to match your NOMA theme seamlessly */
        body {
            margin: 0;
            padding: 24px 16px;
            background-color: #ece9ce; /* Matches your --background */
            color: #2A2B27; /* Matches your --foreground */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        
        #widget-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* 
          NUCLEAR CSS: 
          Targets the exact URL structure and class name prefix you found in the console. 
          Using display: none !important forces it to disappear entirely, closing any empty gaps.
        */
        a[href*="travelpayouts.com/whitelabel"],
        a[href*="poweredby"],
        a[class*="SearchEdit-module__referralLink"],
        a[class*="referralLink"],
        span[class*="referralText"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            width: 0 !important;
            height: 0 !important;
            position: absolute !important;
            z-index: -9999 !important;
        }
    </style>

    <!-- Travelpayouts Whitelabel Script -->
    <script data-noptimize="1" data-cfasync="false" data-wpfc-render="false">
      (function () {
            var script = document.createElement("script");
            script.async = 1;
            script.type = "module";
            script.src = "https://tpembd.com/wl_web/main.js?wl_id=13524";
            document.head.appendChild(script);
          })();
    </script>
</head>
<body>
    <div id="widget-container">
        <div id="tpwl-search"></div>
        <div id="tpwl-tickets"></div>
    </div>

    <script>
        // Just in case the widget uses a "Shadow DOM" to protect its styles from our <head> CSS, 
        // this script will forcefully inject our hiding rules directly into the widget's isolated DOM.
        const injectShadowStyles = () => {
            const css = `
                a[href*="travelpayouts.com/whitelabel"],
                a[class*="referralLink"] {
                    display: none !important;
                }
            `;
            
            document.querySelectorAll('*').forEach(el => {
                if (el.shadowRoot && !el.shadowRoot.querySelector('#noma-hider')) {
                    const style = document.createElement('style');
                    style.id = 'noma-hider';
                    style.textContent = css;
                    el.shadowRoot.appendChild(style);
                }
            });
        };

        // Check for shadow DOMs every 500ms as the widget loads
        const interval = setInterval(injectShadowStyles, 500);
        setTimeout(() => clearInterval(interval), 10000); // Stop checking after 10s
    </script>
</body>
</html>
